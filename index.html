<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Můj Jednoduchý E-shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>TechStore</h1>
            <nav>
                <ul>
                    <li><a href="#">Domů</a></li>
                    <li><a href="#">Produkty</a></li>
                    <li><a href="#">Košík</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2>Naše Nabídka</h2>
        
        <div class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Produkt 1">
                <h3>Bezdrátová sluchátka</h3>
                <p>Kvalitní zvuk pro každý den.</p>
                <span class="price">1 290 Kč</span>
                <button class="buy-btn">Do košíku</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Produkt 2">
                <h3>Chytré hodinky</h3>
                <p>Sledujte svou aktivitu stylově.</p>
                <span class="price">3 450 Kč</span>
                <button class="buy-btn">Do košíku</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Produkt 3">
                <h3>Powerbanka 20k</h3>
                <p>Energie na cesty vždy po ruce.</p>
                <span class="price">890 Kč</span>
                <button class="buy-btn">Do košíku</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TechStore - Všechna práva vyhrazena</p>
    </footer>

</body>
</html>
